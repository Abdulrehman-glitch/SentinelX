# XcodeGen manifest — run `xcodegen generate` in this folder on a Mac to produce
# SentinelXMobileAgent.xcodeproj (the project file is generated, never committed).
name: SentinelXMobileAgent

options:
  bundleIdPrefix: com.sentinelx
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  SentinelXMobileAgent:
    type: application
    platform: iOS
    sources:
      - path: SentinelXMobileAgent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sentinelx.mobileagent
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: SentinelXMobileAgent/Info.plist
      properties:
        CFBundleDisplayName: SentinelX Agent
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # Local dev only: allows plain-HTTP to hosts on the local network
        # (simulator -> 127.0.0.1, device -> dev machine LAN IP). Does not
        # weaken TLS for any non-local host. Production traffic is HTTPS/WSS.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSMotionUsageDescription: >-
          SentinelX uses motion and fitness data to stream device movement
          telemetry (accelerometer, gyroscope, activity) to your monitoring
          dashboard. You can disable this collector at any time in Settings.
        NSLocationWhenInUseUsageDescription: >-
          SentinelX can report this device's location to your monitoring
          dashboard. Location collection is optional and off until you
          enable it.
        NSBluetoothAlwaysUsageDescription: >-
          SentinelX can scan for nearby Bluetooth sensors and report them to
          your monitoring dashboard. Bluetooth scanning is off by default.
        # Default backend endpoints; overridable at runtime from Settings.
        SentinelXDefaultAPIBaseURL: http://127.0.0.1:8000/api/v1/mobile
        SentinelXDefaultWebSocketURL: ws://127.0.0.1:8000/api/v1/mobile/ws

  SentinelXMobileAgentTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SentinelXMobileAgentTests
    dependencies:
      - target: SentinelXMobileAgent

schemes:
  SentinelXMobileAgent:
    build:
      targets:
        SentinelXMobileAgent: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SentinelXMobileAgentTests
