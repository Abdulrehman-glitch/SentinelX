services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinelx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinelx_dev
      POSTGRES_USER: sentinelx_app
      POSTGRES_PASSWORD: SentinelX_app_2026!
    ports:
      - "5432:5432"
    volumes:
      - sentinelx_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelx_app -d sentinelx_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sentinelx_postgres_data:
